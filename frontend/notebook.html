 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook — CodeBloom</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">CodeBloom <span class="sidebar-logo-dot"></span></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Menu</div>
        <a href="dashboard.html" class="nav-item ">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="editor.html" class="nav-item ">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Editor
        </a>
        <a href="notebook.html" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Notebook
        </a>
        <a href="streak.html" class="nav-item ">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Streak
        </a>
        <a href="rewards.html" class="nav-item ">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
          Rewards
        </a>
        <a href="settings.html" class="nav-item ">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>
      <button class="logout-btn" onclick="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div><h1 class="topbar-title">Coding Notebook</h1><p class="topbar-sub">Document your problem solving approaches</p></div>
        <div class="topbar-right">
          <div class="streak-badge"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> <span id="streak-count">0</span> day streak</div>
          <div class="avatar" id="avatar-display">S</div>
        </div>
      </div>
      <div class="notebook-form">
        <h2>Add New Entry</h2>
        <div class="form-row">
          <div class="form-group"><label>Problem Name</label><input type="text" id="problem-name" placeholder="e.g. Two Sum, Longest Substring..."></div>
          <div class="form-group"><label>Difficulty</label><select id="difficulty"><option value="Easy">Easy</option><option value="Medium">Medium</option><option value="Hard">Hard</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Tags</label><input type="text" id="tags" placeholder="e.g. Array, HashMap, DP"></div>
          <div class="form-group"><label>Time Complexity</label><input type="text" id="time-complexity" placeholder="e.g. O(n), O(n log n)"></div>
        </div>
        <div class="form-group"><label>Your Approach</label><textarea id="approach" placeholder="Explain how you solved this problem..." rows="4"></textarea></div>
        <div class="form-group"><label>Key Insight / What You Learned</label><textarea id="insight" placeholder="What was the key insight? What did you learn?" rows="3"></textarea></div>
        <div class="form-group"><label>Code Snippet (optional)</label><textarea id="code-snippet" class="code-textarea" placeholder="Paste your solution here..." rows="5"></textarea></div>
        <button class="auth-btn" onclick="saveNote()" style="max-width:200px">Save Entry</button>
        <div id="note-message"></div>
      </div>
      <div class="notebook-controls">
        <input type="text" id="search-input" placeholder="Search notes..." oninput="filterNotes()">
        <select id="filter-difficulty" onchange="filterNotes()"><option value="All">All Difficulties</option><option value="Easy">Easy</option><option value="Medium">Medium</option><option value="Hard">Hard</option></select>
      </div>
      <div class="section-title">Your Entries (<span id="note-count">0</span>)</div>
      <div id="notes-list" class="notes-list"><p class="empty-msg">No entries yet. Add your first problem solution above!</p></div>
    </main>
  </div>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user"));
    if (!token || !user) window.location = "login.html";
    document.getElementById("avatar-display").textContent = user.username.charAt(0).toUpperCase();
    document.getElementById("streak-count").textContent = user.streak || 0;
    const NOTES_KEY = "notes_" + user.id;
    function getNotes() { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; }
    function saveNotes(notes) { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }
    function saveNote() {
      const problem = document.getElementById("problem-name").value.trim();
      const difficulty = document.getElementById("difficulty").value;
      const tags = document.getElementById("tags").value.trim();
      const timeComplexity = document.getElementById("time-complexity").value.trim();
      const approach = document.getElementById("approach").value.trim();
      const insight = document.getElementById("insight").value.trim();
      const codeSnippet = document.getElementById("code-snippet").value.trim();
      const msg = document.getElementById("note-message");
      if (!problem || !approach) { msg.innerHTML = '<p class="error-msg">Problem name and approach are required!</p>'; return; }
      const note = { id:Date.now(), problem, difficulty, tags, timeComplexity, approach, insight, codeSnippet, date: new Date().toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}) };
      const notes = getNotes(); notes.push(note); saveNotes(notes);
      msg.innerHTML = '<p class="success-msg">Entry saved!</p>';
      ["problem-name","tags","time-complexity","approach","insight","code-snippet"].forEach(id => document.getElementById(id).value="");
      renderNotes(); setTimeout(()=>msg.innerHTML="",2000);
    }
    function deleteNote(id) { if (!confirm("Delete this entry?")) return; saveNotes(getNotes().filter(n=>n.id!==id)); renderNotes(); }
    function filterNotes() { renderNotes(); }
    function renderNotes() {
      const search = document.getElementById("search-input").value.toLowerCase();
      const filterDiff = document.getElementById("filter-difficulty").value;
      let notes = getNotes();
      if (filterDiff !== "All") notes = notes.filter(n=>n.difficulty===filterDiff);
      if (search) notes = notes.filter(n=>n.problem.toLowerCase().includes(search)||n.approach.toLowerCase().includes(search)||(n.tags&&n.tags.toLowerCase().includes(search)));
      document.getElementById("note-count").textContent = notes.length;
      const list = document.getElementById("notes-list");
      if (notes.length===0) { list.innerHTML = '<p class="empty-msg">No entries found</p>'; return; }
      list.innerHTML = notes.reverse().map(n=>`
        <div class="note-card">
          <div class="note-card-header">
            <div class="note-card-title"><h3>${n.problem}</h3><div class="note-tags"><span class="diff-badge diff-${n.difficulty.toLowerCase()}">${n.difficulty}</span>${n.tags?n.tags.split(",").map(t=>`<span class="tag-badge">${t.trim()}</span>`).join(""):""}</div></div>
            <div class="note-card-meta">${n.timeComplexity?`<span class="complexity-badge">${n.timeComplexity}</span>`:""}<span class="note-date-badge">${n.date}</span><button class="delete-btn" onclick="deleteNote(${n.id})"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>
          </div>
          <div class="note-section"><strong>Approach</strong><p>${n.approach}</p></div>
          ${n.insight?`<div class="note-section"><strong>Key Insight</strong><p>${n.insight}</p></div>`:""}
          ${n.codeSnippet?`<div class="note-section"><strong>Code</strong><pre class="note-code">${n.codeSnippet}</pre></div>`:""}
        </div>`).join("");
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location = "login.html";
    }
    renderNotes();
  </script>
</body></html>
